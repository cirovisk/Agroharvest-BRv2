services:
  # Ingestion service (can be run through Cron on Oracle)
  app:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
    container_name: cultivares_app_prod
    env_file: .env
    volumes:
      - ./data:/app/data  # Persist only data
    command: ["python", "src/main.py"]

  # Analytics API in production
  api:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
    container_name: cultivares_api_prod
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data  # Share storage with the ingestion service
    ports:
      - "80:8000"         # Map to Oracle's standard web port 80
    deploy:
      resources:
        limits:
          memory: 2G

  # Metabase for dashboards (OCI Always Free ARM)
  metabase:
    image: metabase/metabase:v0.50.21
    container_name: cultivares_metabase_prod
    profiles: ["dashboard"]
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE_PATH=/metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
      - ./docker/metabase/plugins:/plugins                # Folder with the DuckDB .jar driver
      - ./data:/app/data                  # Acesso ao banco DuckDB e Parquets
    deploy:
      resources:
        limits:
          memory: 4G                      # Aproveitando os 24GB do ARM da Oracle

volumes:
  metabase_data:
