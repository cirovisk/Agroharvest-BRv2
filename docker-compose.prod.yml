services:
  # Serviço de Ingestão (Pode ser rodado via Cron na Oracle)
  app:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
    container_name: cultivares_app_prod
    env_file: .env
    volumes:
      - ./data:/app/data  # Persistência apenas dos dados
    command: ["python", "src/main.py"]

  # API de Analytics em Produção
  api:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
    container_name: cultivares_api_prod
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data  # Compartilha o storage com o serviço de ingestão
    ports:
      - "80:8000"         # Mapeia para a porta 80 padrão da web na Oracle
    deploy:
      resources:
        limits:
          memory: 2G

  # Metabase (Opcional, se quiser dashboard na nuvem)
  metabase:
    image: metabase/metabase:v0.50.21
    container_name: cultivares_metabase_prod
    profiles: ["dashboard"]
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE_PATH=/metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data

volumes:
  metabase_data:
