services:
  # O serviço de ingestão (Pipeline)
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_app
    env_file: .env
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          memory: 4G

  # Rodar testes
  test:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_test
    env_file: .env
    volumes:
      - .:/app
    working_dir: /app
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]

  # API FastAPI (DuckDB + Parquet)
  api:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_api
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # Metabase para Dashboards
  metabase:
    image: metabase/metabase:v0.50.21
    container_name: cultivares_metabase
    profiles: ["dashboard"]
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE_PATH=/metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  metabase_data:
